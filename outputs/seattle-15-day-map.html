<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>西雅图 15 天行程地图</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{margin:0;font:15px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;color:#18212b;background:#f5f7f8}#map{height:40vh;min-height:290px;position:sticky;top:0;z-index:5}.wrap{max-width:780px;margin:auto;padding:18px}.hero{background:#083344;color:#fff;border-radius:18px;padding:22px;margin-bottom:15px}.hero h1{margin:0;font-size:26px}.hero p{margin:8px 0 0;color:#c7e5e8;line-height:1.55}.note{background:#fff8e8;border-left:4px solid #e29b22;padding:12px 14px;border-radius:8px;margin:14px 0;line-height:1.6}.day{background:#fff;border-radius:15px;padding:16px;margin:12px 0;box-shadow:0 2px 8px #18334b12;cursor:pointer}.day:hover{box-shadow:0 5px 17px #18334b26}.head{display:flex;gap:10px;align-items:baseline}.num{font-weight:700;color:#0f766e}.day h2{font-size:18px;margin:0}.area{color:#55707a;margin:6px 0}.route{margin:8px 0;line-height:1.65}.tag,.weather{display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;margin-right:5px}.tag{background:#e1f3f1;color:#07635d}.weather{background:#eaf2ff;color:#225db1}.details{display:none;border-top:1px solid #e4eaec;margin-top:13px;padding-top:10px}.day.open .details{display:block}.stop{padding:11px 0;border-bottom:1px solid #eef1f2;line-height:1.5}.stop:last-child{border:0}.time{font-size:12px;color:#0f766e;font-weight:700;margin-right:7px}.stop p{margin:4px 0;color:#587078;font-size:13px}.btn{display:inline-block;background:#087a72;color:#fff;text-decoration:none;border-radius:8px;padding:7px 10px;font-size:13px;margin:4px 5px 0 0}.btn.routebtn{background:#1a73e8}.footer{color:#60727a;line-height:1.65;padding:10px 2px 30px}</style></head>
<body><div id="map"></div><main class="wrap"><section class="hero"><h1>西雅图 · 15 天参考行程</h1><p>点开每天卡片，查看分站、建议时段，并用 Google Maps 逐点导航或打开当天整条路线。</p></section><div class="note"><strong>使用提示：</strong>市区日适合步行 + Link Light Rail / 公交；雷尼尔山、奥林匹克、惠德比岛建议自驾或报当天团。山岳与海岛日按天气互换，出发前确认道路、渡轮和园区开放情况。</div><div id="days"></div><p class="footer">默认住在 Downtown / Pike Place 一带。地点与路线为参考；Google Maps 按钮会在新窗口打开导航，可按实时交通、体力和营业时间调整。</p></main><script>
const D=[

{n:'D2',t:'西雅图中心',a:'Seattle Center · Belltown',w:'室内比例高',p:[['上午','Space Needle',47.6205,-122.3493,'建议提前预约时段。'],['中午','Chihuly Garden and Glass',47.6206,-122.3505,'紧邻太空针塔。'],['下午','Museum of Pop Culture',47.6215,-122.3480,'流行文化与音乐展。'],['傍晚','Kerry Park',47.6295,-122.3594,'经典城市夜景。']]},
{n:'D3',t:'市中心建筑与艺术',a:'Downtown · Pioneer Square',w:'雨天备选',p:[['上午','Seattle Art Museum',47.6073,-122.3381,'雨天优先的室内主点。'],['中午','Pioneer Square',47.6017,-122.3331,'砖墙街区与咖啡。'],['下午','Seattle Central Library',47.6067,-122.3325,'建筑本身值得一看。'],['晚上','Capitol Hill',47.6231,-122.3200,'晚餐、酒吧和咖啡集中。']]},
{n:'D4',t:'国会山与志愿者公园',a:'Capitol Hill · Madison Valley',w:'慢游 / 咖啡',p:[['上午','Volunteer Park Conservatory',47.6304,-122.3148,'小型温室，阴雨天也适合。'],['中午','Seattle Asian Art Museum',47.6305,-122.3158,'与公园相邻。'],['下午','Volunteer Park Water Tower',47.6302,-122.3135,'能上塔时可看城市。'],['晚上','Capitol Hill',47.6197,-122.3201,'选一家餐厅或鸡尾酒吧。']]},
{n:'D5',t:'巴拉德与弗里蒙特',a:'Ballard · Fremont',w:'晴天优先',p:[['上午','Ballard Locks',47.6686,-122.3972,'看船闸与鲑鱼梯。'],['下午','Golden Gardens Park',47.6914,-122.4025,'海滩和奥林匹克山景。'],['傍晚','Fremont Troll',47.6510,-122.3473,'城市趣味地标。'],['日落','Gas Works Park',47.6456,-122.3344,'湖畔看市中心天际线。']]},
{n:'D6',t:'派克市场深度日',a:'Pike Place · Waterfront',w:'可与 D1 对调',p:[['早餐','Pike Place Market',47.6097,-122.3425,'早点到，避开午间人流。'],['上午','Seattle Aquarium',47.6074,-122.3421,'室内海洋展。'],['下午','Olympic Sculpture Park',47.6166,-122.3543,'免费户外雕塑公园。'],['傍晚','Pier 62',47.6089,-122.3433,'海滨停留或返市场吃饭。']]},
{n:'D7',t:'贝恩布里奇岛',a:'Bainbridge Island',w:'渡轮一日往返',p:[['上午','Seattle Ferry Terminal',47.6025,-122.3394,'提前查渡轮班次。'],['上午','Bainbridge Island Ferry Terminal',47.6220,-122.5098,'抵岛后步行进 Winslow。'],['中午','Winslow Way',47.6242,-122.5209,'主街逛店、午餐。'],['下午','Bloedel Reserve',47.6778,-122.5300,'建议预约；无车可改主街慢游。']]},
{n:'D8',t:'雷尼尔山国家公园',a:'Mount Rainier · Paradise',w:'天气敏感 / 自驾或团',p:[['清晨','Paradise Visitor Center',46.7852,-121.7355,'越早越好；携带保暖防水层。'],['上午','Skyline Trail',46.7865,-121.7350,'按体力走部分即可。'],['下午','Reflection Lakes',46.7436,-121.7050,'无风时倒影最佳。'],['返程','Longmire Museum',46.7490,-121.8110,'下山前短暂停留。']]},
{n:'D9',t:'恢复与华盛顿湖',a:'Madison Park · University District',w:'雷尼尔山后放松',p:[['上午','Washington Park Arboretum',47.6397,-122.2965,'林荫步道，慢节奏。'],['下午','University of Washington',47.6553,-122.3080,'校园与苏扎洛图书馆外观。'],['傍晚','University Village',47.6631,-122.2983,'购物、晚餐、补给。']]},
{n:'D10',t:'奥林匹克国家公园',a:'Olympic Peninsula',w:'天气敏感 / 早出发',p:[['清晨','Bainbridge Ferry Terminal',47.6025,-122.3394,'自驾可走渡轮；不自驾建议跟团。'],['上午','Hurricane Ridge',47.9695,-123.4980,'山脊观景；确认道路开放。'],['中午','Port Angeles',48.1181,-123.4307,'补给午餐。'],['下午','Lake Crescent',48.0580,-123.7853,'湖景停留后返程。']]},
{n:'D11',t:'国际区与唐人街',a:'International District · SODO',w:'雨天备选',p:[['上午','Wing Luke Museum',47.5987,-122.3263,'了解亚裔移民历史。'],['中午','Uwajimaya Seattle',47.5972,-122.3275,'日式超市与熟食。'],['下午','Seattle Chinatown-International District',47.5982,-122.3252,'街区散步、甜品。'],['晚上','T-Mobile Park',47.5914,-122.3325,'有比赛再安排观赛。']]},
{n:'D12',t:'惠德比岛',a:'Whidbey Island · Mukilteo',w:'自驾最顺',p:[['上午','Mukilteo Ferry Terminal',47.9495,-122.3049,'搭渡轮上岛。'],['中午','Langley',48.0409,-122.4085,'小镇午餐与海湾。'],['下午','Coupeville',48.2190,-122.6865,'老码头和历史街区。'],['傍晚','Deception Pass State Park',48.4000,-122.6464,'时间充裕再去；天黑前离开。']]},
{n:'D13',t:'波音与埃弗里特',a:'Everett · Mukilteo',w:'需确认参观时段',p:[['上午','Future of Flight Aviation Center',47.9200,-122.2740,'提前确认工厂参观与证件要求。'],['下午','Mukilteo Lighthouse Park',47.9475,-122.3039,'海边灯塔与海湾。'],['傍晚','Mukilteo Beach',47.9481,-122.3023,'海边晚餐或散步。']]},
{n:'D14',t:'西西雅图与阿尔基海滩',a:'West Seattle · Alki',w:'晴天 / 轻松',p:[['上午','Downtown Seattle Ferry Terminal',47.6025,-122.3394,'搭水上出租船前往西西雅图。'],['中午','Alki Beach Park',47.5798,-122.4105,'海滩、城市景观与午餐。'],['下午','Alki Point Lighthouse',47.5761,-122.4213,'沿海慢走。'],['晚上','West Seattle Junction',47.5616,-122.3861,'购物和晚餐。']]},
{n:'D15',t:'自由收尾与离开',a:'Downtown · Airport',w:'最后一天不跑远',p:[['上午','Pike Place Market',47.6097,-122.3425,'补买咖啡、巧克力或纪念品。'],['中午','Seattle Art Museum',47.6073,-122.3381,'若航班较晚可入馆。'],['出发前','Westlake Station',47.6115,-122.3372,'乘 Link 1 Line 去机场。'],['离开','Seattle-Tacoma International Airport',47.4435,-122.3020,'国际航班预留更充足时间。']]}
];
const gm=(name,lat,lng)=>'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(lat+','+lng+' '+name);const route=d=>{let p=d.p;return 'https://www.google.com/maps/dir/?api=1&origin='+p[0][2]+','+p[0][3]+'&destination='+p[p.length-1][2]+','+p[p.length-1][3]+'&waypoints='+encodeURIComponent(p.slice(1,-1).map(x=>x[2]+','+x[3]).join('|'))};const map=L.map('map').setView([47.6062,-122.3321],11);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO'}).addTo(map);let marks=[];const host=document.querySelector('#days');D.forEach((d,i)=>{let e=document.createElement('article');e.className='day';e.innerHTML=`<div class="head"><span class="num">${d.n}</span><h2>${d.t}</h2></div><div class="area">${d.a}</div><div class="route">${d.p.map(x=>x[1]).join(' → ')}</div><p><span class="tag">${i<7?'市区 / 渡轮':'周边'}</span><span class="weather">${d.w}</span></p><section class="details"><a class="btn routebtn" target="_blank" rel="noopener" href="${route(d)}">在 Google Maps 打开当天路线</a>${d.p.map(x=>`<div class="stop"><span class="time">${x[0]}</span><strong>${x[1]}</strong><p>${x[4]}</p><a class="btn" target="_blank" rel="noopener" href="${gm(x[1],x[2],x[3])}">Google Maps 导航</a></div>`).join('')}</section>`;e.addEventListener('click',ev=>{if(ev.target.tagName!=='A'){document.querySelectorAll('.day').forEach(x=>x!==e&&x.classList.remove('open'));e.classList.toggle('open');show(i)}});host.append(e)});function show(i){marks.forEach(m=>map.removeLayer(m));marks=[];let d=D[i],bounds=[];d.p.forEach((x,k)=>{let m=L.marker([x[2],x[3]]).addTo(map).bindPopup(`<b>${k+1}. ${x[1]}</b><br>${x[0]}`);marks.push(m);bounds.push([x[2],x[3]])});if(bounds.length>1)map.fitBounds(bounds,{padding:[45,45],maxZoom:13});else map.setView(bounds[0],13);location.hash='day-'+(i+1)}show(0);</script></body></html>
